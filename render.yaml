services:
  - type: web
    name: ncl-turnuva
    runtime: node
    plan: free
    buildCommand: cd client && npm install && npm run build && cd ../server && npm install
    startCommand: cd server && node src/index.js
    healthCheckPath: /api/sports
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
